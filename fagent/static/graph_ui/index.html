<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>fagent Graph UI</title>
  <link rel="stylesheet" href="/assets/vis-network.min.css">
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
  <div class="shell">
    <header class="masthead">
      <div class="brandBlock">
        <div class="brandMark">fg</div>
        <div class="brand">
          <strong>fagent graph studio</strong>
          <span>local memory atlas for exploring, editing and shaping graph context</span>
        </div>
      </div>
      <div class="heroMeta">
        <div class="heroBadge">Local-only</div>
        <div class="heroBadge accent">vis-network</div>
      </div>
    </header>

    <main class="layout">
      <section class="stage">
        <div class="floatingBar">
          <div class="searchCluster">
            <label class="field compact">
              <span>Search</span>
              <input id="query" type="search" placeholder="Search id, label, metadata">
            </label>
            <label class="field compact">
              <span>Session</span>
              <input id="session" type="text" placeholder="Session filter">
            </label>
          </div>
          <div class="controls">
            <label class="field compact selectField modeField">
              <span>Mode</span>
              <select id="modeSelect">
                <option value="global-clustered">Clustered</option>
                <option value="global-raw">Raw</option>
                <option value="focus-expand">Focus</option>
              </select>
            </label>
            <label class="toggleChip"><input id="showHiddenToggle" type="checkbox" checked> <span>Show hidden counts</span></label>
            <label class="toggleChip"><input id="hideWeakEdgesToggle" type="checkbox"> <span>Hide weak edges</span></label>
            <label class="toggleChip"><input id="freezeLayoutToggle" type="checkbox"> <span>Freeze layout</span></label>
            <button id="loadBtn" class="btn primary">Load graph</button>
            <button id="focusBtn" class="btn ghost">Focus match</button>
            <button id="fitBtn" class="btn ghost">Fit</button>
            <button id="physicsBtn" class="btn ghost">Physics: on</button>
            <button id="saveLayoutBtn" class="btn secondary">Save positions</button>
          </div>
        </div>

        <div class="stageMeta">
          <div class="statusCard">
            <div class="eyebrow">Graph snapshot</div>
            <div class="stats" id="stats">
              <div class="stat">
                <span class="statLabel">Nodes</span>
                <strong id="nodeCount">0</strong>
              </div>
              <div class="stat">
                <span class="statLabel">Edges</span>
                <strong id="edgeCount">0</strong>
              </div>
              <div class="stat">
                <span class="statLabel">Query</span>
                <strong id="queryState">latest</strong>
              </div>
            </div>
          </div>
          <div class="hintCard" id="statusBanner">
            Select a node to inspect, expand neighbors, or pin a layout.
          </div>
        </div>

        <div class="canvasWrap">
          <div class="graphBackdrop"></div>
          <div id="network"></div>
        </div>
      </section>

      <aside class="sidebar">
        <section class="panel featurePanel">
          <div class="panelHeader">
            <div>
              <div class="eyebrow">Selection</div>
              <h2>Inspector</h2>
            </div>
            <div class="panelBadge" id="selectionBadge">Idle</div>
          </div>
          <div id="inspector" class="inspector empty">Select a node or edge</div>
          <div class="inlineActions">
            <button id="expandBtn" class="btn secondary" disabled>Expand neighbors</button>
            <button id="deleteSelectedBtn" class="btn danger" disabled>Delete selected</button>
          </div>
        </section>

        <section class="panel">
          <div class="panelHeader">
            <div>
              <div class="eyebrow">Edit</div>
              <h2>Node</h2>
            </div>
          </div>
          <form id="nodeForm">
            <label class="field">ID <input name="id" required></label>
            <label class="field">Label <input name="label" required></label>
            <div class="split">
              <label class="field">Kind <input name="kind" placeholder="entity, fact, episode"></label>
              <label class="field">Confidence <input name="confidence" type="number" step="0.01" placeholder="0.92"></label>
            </div>
            <label class="field">Metadata JSON <textarea name="metadata_json" rows="7">{}</textarea></label>
            <div class="inlineActions">
              <button type="submit" class="btn primary">Save node</button>
              <button type="button" id="resetNodeBtn" class="btn ghost">New node</button>
            </div>
          </form>
        </section>

        <section class="panel">
          <div class="panelHeader">
            <div>
              <div class="eyebrow">Connect</div>
              <h2>Edge</h2>
            </div>
          </div>
          <form id="edgeForm">
            <label class="field">Source <input name="source_id" required></label>
            <label class="field">Relation <input name="relation" required></label>
            <label class="field">Target <input name="target_id" required></label>
            <label class="field">Weight <input name="weight" type="number" step="0.01" value="1"></label>
            <label class="field">Metadata JSON <textarea name="metadata_json" rows="6">{}</textarea></label>
            <div class="inlineActions">
              <button type="submit" class="btn primary">Save edge</button>
              <button type="button" id="resetEdgeBtn" class="btn ghost">New edge</button>
            </div>
          </form>
        </section>
      </aside>
    </main>
  </div>

  <script src="/assets/vis-network.min.js"></script>
  <script src="/assets/app.js"></script>
</body>
</html>
