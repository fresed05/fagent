<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>fagent Graph UI</title>
  <link rel="stylesheet" href="/assets/vis-network.min.css">
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
  <div class="shell">
    <header class="toolbar">
      <div class="brand">
        <strong>fagent graph</strong>
        <span>local graph viewer/editor</span>
      </div>
      <div class="controls">
        <input id="query" type="search" placeholder="Search id, label, metadata">
        <input id="session" type="text" placeholder="Session filter (optional)">
        <button id="loadBtn">Load</button>
        <button id="fitBtn">Fit</button>
        <button id="physicsBtn">Physics: on</button>
        <button id="saveLayoutBtn">Save positions</button>
      </div>
    </header>

    <main class="layout">
      <section class="canvasWrap">
        <div id="network"></div>
      </section>

      <aside class="sidebar">
        <section class="panel">
          <h2>Inspector</h2>
          <div id="inspector" class="inspector empty">Select a node or edge</div>
          <div class="inlineActions">
            <button id="expandBtn" disabled>Expand neighbors</button>
            <button id="deleteSelectedBtn" disabled>Delete selected</button>
          </div>
        </section>

        <section class="panel">
          <h2>Node</h2>
          <form id="nodeForm">
            <label>ID <input name="id" required></label>
            <label>Label <input name="label" required></label>
            <label>Kind <input name="kind"></label>
            <label>Confidence <input name="confidence" type="number" step="0.01"></label>
            <label>Metadata JSON <textarea name="metadata_json" rows="6">{}</textarea></label>
            <div class="inlineActions">
              <button type="submit">Save node</button>
              <button type="button" id="resetNodeBtn">New node</button>
            </div>
          </form>
        </section>

        <section class="panel">
          <h2>Edge</h2>
          <form id="edgeForm">
            <label>Source <input name="source_id" required></label>
            <label>Relation <input name="relation" required></label>
            <label>Target <input name="target_id" required></label>
            <label>Weight <input name="weight" type="number" step="0.01" value="1"></label>
            <label>Metadata JSON <textarea name="metadata_json" rows="6">{}</textarea></label>
            <div class="inlineActions">
              <button type="submit">Save edge</button>
              <button type="button" id="resetEdgeBtn">New edge</button>
            </div>
          </form>
        </section>
      </aside>
    </main>
  </div>

  <script src="/assets/vis-network.min.js"></script>
  <script src="/assets/app.js"></script>
</body>
</html>
